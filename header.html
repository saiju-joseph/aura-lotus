<!doctype html>
<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1" />

      <title>Varmuki Navbar</title>

      <!-- Bootstrap -->
      <link
         href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
         rel="stylesheet"
      />

      <!-- Icons -->
      <link
         href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
         rel="stylesheet"
      />

      <style>
         body {
            background: #f5f5f5;
         }

         /* TOP BAR */
         .top-bar {
            padding: 15px 0;
         }

         .search-box {
            max-width: 280px;
            border-radius: 8px;
            padding-left: 35px;
         }

         .search-wrapper {
            position: relative;
         }

         .search-wrapper i {
            position: absolute;
            top: 50%;
            left: 12px;
            transform: translateY(-50%);
            color: #888;
         }

         .logo {
            font-size: 30px;
            font-weight: 600;
            color: #6b2c2c;
            letter-spacing: 1px;
         }

         .nav-icons i {
            font-size: 20px;
            margin-left: 20px;
            cursor: pointer;
         }

         /* MENU */
         .menu-bar {
            padding-bottom: 10px;
         }

         .menu-bar .nav-link {
            color: #777;
            font-weight: 500;
            margin: 0 15px;
         }

         .menu-bar .nav-link.active {
            color: #6b2c2c;
            font-weight: 600;
         }

         /* MOBILE */
         @media (max-width: 991px) {
            .search-desktop,
            .icons-desktop {
               display: none;
            }

            .logo {
               text-align: center;
               width: 100%;
            }
         }
      </style>
   </head>
   <body>
      <!-- TOP BAR -->
      <div class="container top-bar">
         <div class="row align-items-center">
            <!-- Search -->
            <div class="col-lg-4 search-desktop">
               <div class="search-wrapper">
                  <i class="bi bi-search"></i>
                  <input
                     type="text"
                     class="form-control search-box"
                     placeholder="Search for products..."
                  />
               </div>
            </div>

            <!-- Logo -->
            <div class="col-lg-4 text-center">
               <div class="logo">Varmuki</div>
            </div>

            <!-- Icons -->
            <div class="col-lg-4 text-end icons-desktop nav-icons">
               <i class="bi bi-cart"></i>
               <i class="bi bi-heart"></i>
               <i class="bi bi-person"></i>
            </div>
         </div>
      </div>

      <!-- MENU BAR -->
      <nav class="navbar navbar-expand-lg menu-bar">
         <div class="container justify-content-center">
            <!-- Toggler -->
            <button
               class="navbar-toggler"
               type="button"
               data-bs-toggle="collapse"
               data-bs-target="#menu"
            >
               <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Menu -->
            <div
               class="collapse navbar-collapse justify-content-center"
               id="menu"
            >
               <ul class="navbar-nav text-center">
                  <li class="nav-item">
                     <a class="nav-link" href="#">Home</a>
                  </li>
                  <li class="nav-item">
                     <a class="nav-link active" href="#">Shop</a>
                  </li>
                  <li class="nav-item">
                     <a class="nav-link" href="#">Categories</a>
                  </li>
               </ul>

               <!-- MOBILE CONTENT -->
               <div class="d-lg-none mt-3 w-100">
                  <input
                     class="form-control mb-3"
                     type="search"
                     placeholder="Search for products..."
                  />

                  <div class="text-center nav-icons">
                     <i class="bi bi-cart"></i>
                     <i class="bi bi-heart"></i>
                     <i class="bi bi-person"></i>
                  </div>
               </div>
            </div>
         </div>
      </nav>

      <!-- JS -->
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
   </body>
</html>
